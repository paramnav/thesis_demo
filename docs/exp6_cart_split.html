<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1D Regression Tree Split Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        .container {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .slider-box {
            margin: 25px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type=range] {
            flex-grow: 1;
            height: 8px;
            border-radius: 5px;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .metric-card { text-align: center; }
        .metric-val { font-size: 1.25rem; font-weight: bold; color: #007bff; }
        .highlight { color: #28a745 !important; }
        .back { margin-bottom: 1rem; }
        .back a { color: #2471a3; }
    </style>
</head>
<body>

<p class="back"><a href="index.html">&larr; All experiments</a></p>

<div class="container">
    <h2>1D Regression Tree Split Simulator</h2>
    <p style="color: #666;">Adjust the threshold ($t$) using the slider to find the split that maximizes variance reduction (&Delta;), matching the CART objective in the thesis.</p>

    <div style="position: relative; height:400px; width:100%">
        <canvas id="treeChart"></canvas>
    </div>

    <div class="slider-box">
        <label><b>Split threshold ($t$):</b></label>
        <input type="range" id="thresholdSlider" min="0.5" max="9.5" step="0.1" value="3.0">
        <span id="sliderVal" style="font-weight:bold; width:30px;">3.0</span>
    </div>

    <div class="metrics">
        <div class="metric-card">
            <div>Left mean ($c_L$)</div>
            <div id="valCL" class="metric-val">-</div>
        </div>
        <div class="metric-card">
            <div>Right mean ($c_R$)</div>
            <div id="valCR" class="metric-val">-</div>
        </div>
        <div class="metric-card">
            <div><b>Variance reduction (&Delta;)</b></div>
            <div id="valDelta" class="metric-val highlight">-</div>
        </div>
    </div>
</div>

<script>
const dataPoints = [];
const N = 60;
for (let i = 0; i < N; i++) {
    const x = Math.random() * 10;
    const baseZ = (x < 5.5) ? 3.0 : 8.0;
    const noise = (Math.random() - 0.5) * 1.5;
    dataPoints.push({ x: x, y: Math.max(0, baseZ + noise) });
}

const globalMean = dataPoints.reduce((sum, p) => sum + p.y, 0) / N;
const globalVariance = dataPoints.reduce((sum, p) => sum + Math.pow(p.y - globalMean, 2), 0) / N;

const ctx = document.getElementById('treeChart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'scatter',
    data: {
        datasets: [
            {
                label: 'Observed data',
                data: dataPoints,
                backgroundColor: 'rgba(0, 123, 255, 0.6)',
                pointRadius: 5
            },
            {
                label: 'Tree prediction T(x)',
                data: [],
                type: 'line',
                borderColor: 'rgba(220, 53, 69, 1)',
                borderWidth: 3,
                fill: false,
                stepped: 'before',
                pointRadius: 0
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            x: { min: 0, max: 10, title: { display: true, text: 'Environmental predictor (X)' } },
            y: { min: 0, max: 11, title: { display: true, text: 'Target (Y)' } }
        },
        plugins: { legend: { position: 'top' } }
    }
});

function updateSplit(t) {
    const leftNode = dataPoints.filter(p => p.x <= t);
    const rightNode = dataPoints.filter(p => p.x > t);
    const nL = leftNode.length;
    const nR = rightNode.length;
    const cL = nL > 0 ? leftNode.reduce((sum, p) => sum + p.y, 0) / nL : 0;
    const cR = nR > 0 ? rightNode.reduce((sum, p) => sum + p.y, 0) / nR : 0;
    const varL = nL > 0 ? leftNode.reduce((sum, p) => sum + Math.pow(p.y - cL, 2), 0) / nL : 0;
    const varR = nR > 0 ? rightNode.reduce((sum, p) => sum + Math.pow(p.y - cR, 2), 0) / nR : 0;
    const delta = globalVariance - ((nL / N) * varL) - ((nR / N) * varR);

    document.getElementById('valCL').innerText = cL.toFixed(2);
    document.getElementById('valCR').innerText = cR.toFixed(2);
    document.getElementById('valDelta').innerText = delta.toFixed(2);

    chart.data.datasets[1].data = [
        { x: 0, y: cL },
        { x: t, y: cL },
        { x: t, y: cR },
        { x: 10, y: cR }
    ];
    chart.update('none');
}

const slider = document.getElementById('thresholdSlider');
const sliderVal = document.getElementById('sliderVal');
slider.addEventListener('input', (e) => {
    const t = parseFloat(e.target.value);
    sliderVal.innerText = t.toFixed(1);
    updateSplit(t);
});
updateSplit(parseFloat(slider.value));
</script>

</body>
</html>
